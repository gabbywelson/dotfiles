# ~/.config/starship.toml
# Fast, aesthetic prompt with Catppuccin Mocha colors
#
# Docs: https://starship.rs/config/

# Use Catppuccin Mocha color palette
palette = "catppuccin_mocha"

# Prompt format - clean and informative
format = """
$directory\
$git_branch\
$git_status\
$nodejs\
$package\
$cmd_duration\
$line_break\
$character"""

# Timeout for commands (ms)
command_timeout = 500

# ============================================
# Modules
# ============================================

[directory]
style = "bold lavender"
format = "[$path]($style)[$read_only]($read_only_style) "
truncation_length = 3
truncate_to_repo = true
read_only = " 󰌾"
read_only_style = "red"
home_symbol = "~"

[git_branch]
style = "bold mauve"
format = "[$symbol$branch(:$remote_branch)]($style) "
symbol = " "
truncation_length = 20

[git_status]
style = "bold maroon"
format = '([$all_status$ahead_behind]($style) )'
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "*${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[nodejs]
style = "bold green"
format = "[$symbol($version)]($style) "
symbol = " "
detect_files = ["package.json", ".node-version", ".nvmrc"]
detect_folders = ["node_modules"]

[package]
style = "bold peach"
format = "[$symbol$version]($style) "
symbol = "📦 "
display_private = false

[cmd_duration]
style = "bold yellow"
format = "[$duration]($style) "
min_time = 2000
show_milliseconds = false

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

[line_break]
disabled = false

# ============================================
# Disabled modules (for cleaner prompt)
# ============================================

[aws]
disabled = true

[gcloud]
disabled = true

[kubernetes]
disabled = true

# ============================================
# Catppuccin Mocha Palette
# ============================================

